  <style>
    .reclamation-page-title {
      margin-top: 120px;
      margin-bottom: 40px;
      text-align: center;
    }
    .reclamation-page-title h2 {
      font-size: 42px;
      color: #fff;
      margin-bottom: 10px;
    }
    .reclamation-page-title p {
      color: #fff;
      font-size: 18px;
      margin: 0;
    }
    .form-wrapper {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
      padding: 30px;
    }
    .form-wrapper .form-group label {
      font-weight: 600;
      color: #222;
    }
    .form-wrapper .form-control {
      border-radius: 8px;
      min-height: 46px;
      border: 1px solid #dfe4ea;
    }
    .form-wrapper textarea.form-control {
      min-height: 140px;
      resize: vertical;
      padding-top: 12px;
    }
    .form-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
  </style>

  <section class="home_bg" style="background-image: url(assets/img/bg/home-bg.jpg); background-size: cover; background-position: center center; padding: 120px 0 80px;">
    <div class="container">
      <div class="reclamation-page-title">
        <h2>Déposer une réclamation</h2>
        <p>Signalez un problème et suivez son traitement.</p>
      </div>
    </div>
  </section>

  <section class="template_property section-padding">
    <div class="container">
      <div class="row">
        <div class="col-lg-8 offset-lg-2 col-sm-12 col-xs-12">
          <div class="form-wrapper">
            <form action="#" method="post">
              <div class="form-group">
                <label for="type">Type de réclamation *</label>
                <select id="type" name="type" class="form-control" required>
                  <option value="">Sélectionnez un type</option>
                  <option value="technique">Problème technique</option>
                  <option value="offre">Signalement d'offre inappropriée</option>
                  <option value="compte">Problème de compte</option>
                  <option value="suggestion">Suggestion</option>
                  <option value="autre">Autre</option>
                </select>
              </div>

              <div class="form-group">
                <label for="sujet">Sujet *</label>
                <input type="text" id="sujet" name="sujet" class="form-control" placeholder="Ex: Problème d'accès à une offre" required>
              </div>

              <div class="form-group">
                <label for="message">Message *</label>
                <textarea id="message" name="message" class="form-control" placeholder="Décrivez votre problème en détail..." required></textarea>
              </div>

              <div class="form-actions">
                <button type="submit" class="btn btn-serach-bg">Envoyer ma réclamation</button>
                <button type="reset" class="btn btn-secondary">Réinitialiser</button>
                <a href="front_mes_reclamations.html" class="btn btn-serach-bg">Retour à mes réclamations</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>
